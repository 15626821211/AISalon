version: '3.8'

services:
  app:
    build: .
    container_name: aisalon-app
    restart: always
    env_file: .env.production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5000:5000"
    networks:
      - aisalon-net

  nginx:
    image: docker.m.daocloud.io/nginx:alpine
    container_name: aisalon-nginx
    restart: always
    ports:
      - "8180:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - aisalon-net

networks:
  aisalon-net:
    driver: bridge
